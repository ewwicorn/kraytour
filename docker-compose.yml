services:

  minio:
    image: minio/minio:latest
    container_name: kraytour_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: kraytour_db
    environment:
      POSTGRES_USER: kraytour
      POSTGRES_PASSWORD: kraytour
      POSTGRES_DB: kraytour
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # BUG FIX: was missing healthcheck — backend started before DB was ready
      test: ["CMD-SHELL", "pg_isready -U kraytour -d kraytour"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: kraytour_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://kraytour:kraytour@postgres:5432/kraytour
      SECRET_KEY: your_secret_key_here
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_NAME: kraytour
      MINIO_SECURE: "false"
    depends_on:
      postgres:
        condition: service_healthy  # BUG FIX: wait until postgres is actually ready
      minio:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
